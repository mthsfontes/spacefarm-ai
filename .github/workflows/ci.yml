name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: spacefarm-ai

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: spacefarm-ai/requirements.txt

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install pytest mongomock

      - name: Rodar testes
        run: pytest tests/ -v
